<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Beast Mode - Staff Dashboard</title>
<style>
  :root {
    --ink: #111214;
    --paper: #f5f4f2;
    --panel: #ffffff;
    --line: #26282c;
    --line-soft: #dcdad6;
    --accent: #d81e2c;
    --accent-dark: #a1141f;
    --accent-soft: #fbe2e3;
    --muted: #6b6c70;
    --ok: #2f6b3a;
    --ok-soft: #e3f0e4;
    --warn: #9a6b0f;
    --warn-soft: #fbf0d9;
    --info: #1f5f8b;
    --info-soft: #dcedf7;
    --font-display: 'Arial Black', 'Helvetica Neue', Arial, sans-serif;
    --font-body: 'Helvetica Neue', Arial, -apple-system, sans-serif;
    --font-mono: 'SF Mono', 'Consolas', monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--font-body);
    padding: 0 0 80px;
  }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 0 20px; }

  .topbar {
    background: var(--ink);
    color: #fff;
    padding: 12px 20px;
    margin-bottom: 36px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }
  .brand-logo { display: flex; align-items: center; }
  .brand-logo img { display: block; }
  .topbar .tagline {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: #b8b8ba;
  }
  .topbar-right { display: flex; align-items: center; gap: 14px; }
  .staff-pill {
    font-family: var(--font-mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #cfcfd1;
    border: 1px solid #3a3c40;
    padding: 4px 10px;
    border-radius: 2px;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    border-bottom: 4px solid var(--ink);
    padding-bottom: 16px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
  }
  header h1 {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 30px;
    margin: 0;
    letter-spacing: -0.01em;
    text-transform: uppercase;
  }
  header .subtitle { font-size: 12.5px; color: var(--muted); margin-top: 4px; }

  .toolbar {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 18px;
  }
  .toolbar input[type="text"] {
    flex: 1;
    min-width: 220px;
    padding: 10px 12px;
    border: 2px solid var(--line-soft);
    background: var(--panel);
    font-family: var(--font-body);
    font-size: 14px;
    border-radius: 2px;
  }
  .toolbar input[type="text"]:focus { outline: none; border-color: var(--accent); }
  .toolbar select {
    padding: 10px 12px;
    border: 2px solid var(--line-soft);
    background: var(--panel);
    font-family: var(--font-body);
    font-size: 13px;
    border-radius: 2px;
  }
  .btn {
    background: var(--ink);
    color: #fff;
    border: none;
    padding: 10px 16px;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    cursor: pointer;
    border-radius: 2px;
    font-family: var(--font-body);
    white-space: nowrap;
  }
  .btn:hover { background: var(--accent); }
  .btn.secondary { background: #fff; color: var(--ink); border: 2px solid var(--line-soft); }
  .btn.secondary:hover { background: var(--accent-soft); border-color: var(--accent); color: var(--ink); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 10px;
    margin-bottom: 20px;
  }
  .stat-card {
    background: var(--panel);
    border: 2px solid var(--line-soft);
    border-radius: 2px;
    padding: 12px 14px;
  }
  .stat-card .stat-label { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); font-weight: 700; }
  .stat-card .stat-value { font-family: var(--font-display); font-size: 24px; margin-top: 4px; }

  table { width: 100%; border-collapse: collapse; margin-top: 4px; }
  .orders-table thead th {
    text-align: left;
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 700;
    color: var(--muted);
    border-bottom: 2px solid var(--ink);
    padding: 9px 8px;
    background: var(--panel);
    position: sticky;
    top: 0;
  }
  .orders-table tbody td { padding: 10px 8px; border-bottom: 1px solid var(--line-soft); vertical-align: middle; font-size: 13.5px; }
  .orders-table tbody tr:hover td { background: var(--accent-soft); }
  .orders-table .code-cell { font-family: var(--font-mono); font-size: 12.5px; }
  .orders-table-wrap { background: var(--panel); border: 2px solid var(--line-soft); border-radius: 2px; overflow: hidden; }
  .orders-table-wrap .orders-table { margin: 0; }
  .orders-table-wrap thead th:first-child { padding-left: 14px; }
  .orders-table-wrap tbody td:first-child { padding-left: 14px; }

  select.status-select {
    padding: 6px 8px;
    border: 2px solid var(--line-soft);
    border-radius: 2px;
    font-family: var(--font-body);
    font-size: 12.5px;
    font-weight: 700;
    cursor: pointer;
  }
  .status-new { background: var(--info-soft); color: var(--info); border-color: var(--info); }
  .status-in_production { background: var(--warn-soft); color: var(--warn); border-color: var(--warn); }
  .status-ready { background: var(--ok-soft); color: var(--ok); border-color: var(--ok); }
  .status-completed { background: #ececec; color: var(--muted); border-color: var(--line-soft); }
  .status-cancelled { background: var(--accent-soft); color: var(--accent-dark); border-color: var(--accent); }

  .empty-state { color: var(--muted); font-size: 13px; padding: 40px 8px; text-align: center; font-style: italic; }

  /* Detail view */
  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--muted);
    font-size: 12.5px;
    text-decoration: none;
    cursor: pointer;
    margin-bottom: 14px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .back-link:hover { color: var(--accent); }

  .detail-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    flex-wrap: wrap;
    gap: 16px;
    border-bottom: 4px solid var(--ink);
    padding-bottom: 16px;
    margin-bottom: 20px;
  }
  .detail-head h2 {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 24px;
    margin: 0 0 4px;
    text-transform: uppercase;
  }
  .detail-meta { font-size: 12.5px; color: var(--muted); line-height: 1.7; }
  .detail-meta code { font-family: var(--font-mono); background: var(--paper); padding: 1px 6px; border-radius: 2px; }
  .detail-actions { display: flex; gap: 8px; align-items: flex-start; flex-wrap: wrap; }

  .info-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .info-card {
    background: var(--panel);
    border: 2px solid var(--line-soft);
    border-radius: 2px;
    padding: 12px 14px;
  }
  .info-card .info-label { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); font-weight: 700; margin-bottom: 4px; }
  .info-card .info-value { font-size: 14px; font-weight: 600; }
  .info-card .info-value.mono { font-family: var(--font-mono); font-size: 13px; }

  .review-garment-block { margin-bottom: 26px; }
  .review-garment-block:last-child { margin-bottom: 0; }
  .review-garment-heading {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 15px;
    text-transform: uppercase;
    border-bottom: 3px solid var(--ink);
    padding-bottom: 6px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .review-garment-heading small { font-family: var(--font-mono); font-weight: 400; font-size: 11.5px; color: var(--muted); text-transform: none; }
  table.review-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.review-table th {
    text-align: left;
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 700;
    color: var(--muted);
    border-bottom: 2px solid var(--line-soft);
    padding: 7px 8px;
  }
  table.review-table td { padding: 6px 8px; border-bottom: 1px solid var(--line-soft); }
  table.review-table tr:nth-child(even) td { background: #fafaf9; }
  .review-missing { color: var(--accent); font-style: italic; }

  .summary {
    margin-top: 30px;
    border-top: 4px solid var(--ink);
    padding-top: 18px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    flex-wrap: wrap;
    gap: 20px;
  }
  .summary-by-garment { display: flex; flex-direction: column; gap: 8px; }
  .summary-garment-row { display: flex; align-items: baseline; gap: 10px; font-size: 12.5px; }
  .summary-garment-name { font-weight: 700; min-width: 200px; }
  .size-breakdown { font-family: var(--font-mono); font-size: 12px; color: var(--ink); display: flex; flex-wrap: wrap; gap: 5px; }
  .size-chip { background: var(--ink); color: #fff; padding: 3px 8px; border-radius: 2px; font-weight: 600; }
  .grand-total { font-family: var(--font-display); font-weight: 900; font-size: 14px; text-transform: uppercase; letter-spacing: 0.04em; white-space: nowrap; color: var(--ink); }
  .grand-total b { font-size: 30px; color: var(--accent); display: block; letter-spacing: normal; }

  .loading-note { color: var(--muted); font-size: 13px; padding: 30px 8px; text-align: center; }

  @media print {
    .topbar, .toolbar, .back-link, .detail-actions, .btn { display: none !important; }
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

function escapeHtml(str) {
  return String(str == null ? "" : str)

    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")

function formatDate(iso) {
  if (!iso) return "\u2014";
  const d = new Date(iso);
  if (isNaN(d.getTime())) return "\u2014";
  return d.toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" }) +

}

  let total = 0;
  const garments = (data && data.garments) || [];
  const rowsByGarment = (data && data.rowsByGarment) || {};
  garments.forEach(g => {
    (rowsByGarment[g] || []).forEach(row => {
      if (row.size) total += 1;
    });
  });
  return total;
}

// --- Load all orders ---
async function loadOrders() {
  document.getElementById('ordersLoadingNote').style.display = 'block';
  document.getElementById('ordersEmptyState').style.display = 'none';
  try {
    const { data, error } = await supabaseClient
      .from('orders')
      .select('code, data, updated_at')
      .order('updated_at', { ascending: false });
    if (error) throw error;
    allOrders = data || [];
  } catch (e) {
    console.error('Failed to load orders:', e);
    allOrders = [];
    document.getElementById('ordersTableBody').innerHTML = '';
    document.getElementById('ordersEmptyState').textContent = 'Could not load orders. Check your connection and try refreshing.';
    document.getElementById('ordersEmptyState').style.display = 'block';
    document.getElementById('ordersLoadingNote').style.display = 'none';
    renderStats();
    return;
  }
  document.getElementById('ordersLoadingNote').style.display = 'none';
  renderStats();
  renderOrdersTable();
}

function renderStats() {
  const statsRow = document.getElementById('statsRow');
  const counts = { new: 0, in_production: 0, ready: 0, completed: 0, cancelled: 0 };
  allOrders.forEach(o => {
    const status = (o.data && o.data.status) || 'new';
    if (counts[status] === undefined) counts[status] = 0;
    counts[status] += 1;
  });
  const cards = [
    { label: 'Total orders', value: allOrders.length },
    { label: 'New', value: counts.new },
    { label: 'In production', value: counts.in_production },
    { label: 'Ready for pickup', value: counts.ready },
    { label: 'Completed', value: counts.completed }
  ];
  statsRow.innerHTML = cards.map(c =>
    '<div class="stat-card"><div class="stat-label">' + escapeHtml(c.label) + '</div><div class="stat-value">' + c.value + '</div></div>'
  ).join('');
}

function getFilteredOrders() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const statusFilter = document.getElementById('statusFilter').value;
  return allOrders.filter(o => {
    const teamName = (o.data && o.data.teamName) || '';
    const status = (o.data && o.data.status) || 'new';
    if (statusFilter && status !== statusFilter) return false;
    if (!q) return true;
    return o.code.toLowerCase().includes(q) || teamName.toLowerCase().includes(q);
  });
}

function renderOrdersTable() {
  const tbody = document.getElementById('ordersTableBody');
  const emptyState = document.getElementById('ordersEmptyState');
  const filtered = getFilteredOrders();

  if (filtered.length === 0) {
    tbody.innerHTML = '';
    emptyState.textContent = allOrders.length === 0 ? 'No orders yet.' : 'No orders match your search.';
    emptyState.style.display = 'block';
    return;
  }
  emptyState.style.display = 'none';

  tbody.innerHTML = filtered.map(o => {
    const teamName = (o.data && o.data.teamName) || '<span style="color:var(--muted);font-style:italic;">Untitled order</span>';
    const status = (o.data && o.data.status) || 'new';
    const pieces = totalPiecesFor(o.data);
    return '<tr data-code="' + escapeHtml(o.code) + '">' +
      '<td class="code-cell">' + escapeHtml(o.code) + '</td>' +
      '<td>' + teamName + '</td>' +
      '<td>' + pieces + '</td>' +
      '<td><select class="status-select status-' + status + '" data-code="' + escapeHtml(o.code) + '">' +
        Object.keys(STATUS_LABELS).map(s => '<option value="' + s + '"' + (s === status ? ' selected' : '') + '>' + STATUS_LABELS[s] + '</option>').join('') +
      '</select></td>' +
      '<td>' + formatDate(o.updated_at) + '</td>' +
      '<td><button class="btn secondary view-btn" data-code="' + escapeHtml(o.code) + '" type="button">View</button></td>' +
      '</tr>';
  }).join('');

  tbody.querySelectorAll('.view-btn').forEach(btn => {
    btn.addEventListener('click', () => openDetail(btn.getAttribute('data-code')));
  });
  tbody.querySelectorAll('.status-select').forEach(sel => {
    sel.addEventListener('change', e => {
      e.stopPropagation();
      const code = sel.getAttribute('data-code');
      updateStatus(code, sel.value);
      sel.className = 'status-select status-' + sel.value;
    });
  });
  tbody.querySelectorAll('tr').forEach(tr => {
    tr.addEventListener('click', e => {
      if (e.target.closest('select') || e.target.closest('button')) return;
      openDetail(tr.getAttribute('data-code'));
    });
    tr.style.cursor = 'pointer';
  });
}

async function updateStatus(code, newStatus) {
  const order = allOrders.find(o => o.code === code);
  if (!order) return;
  const newData = { ...(order.data || {}), status: newStatus };
  order.data = newData; // optimistic local update
  try {
    const { error } = await supabaseClient
      .from('orders')
      .update({ data: newData, updated_at: new Date().toISOString() })
      .eq('code', code);
    if (error) throw error;
  } catch (e) {
    console.error('Failed to update status:', e);
    alert('Could not save the status change. Please try again.');
  }
  renderStats();
  if (currentDetailCode === code) {
    document.getElementById('detailStatusSelect').value = newStatus;
  }
}

// --- Detail view ---
function openDetail(code) {
  const order = allOrders.find(o => o.code === code);
  if (!order) return;
  currentDetailCode = code;
  setURLCode(code);
  renderDetail(order);
  document.getElementById('dashboardView').style.display = 'none';
  document.getElementById('detailView').style.display = 'block';
  window.scrollTo(0, 0);
}

function closeDetail() {
  currentDetailCode = null;
  setURLCode(null);
  document.getElementById('detailView').style.display = 'none';
  document.getElementById('dashboardView').style.display = 'block';
}

function setURLCode(code) {
  const url = new URL(window.location.href);
  if (code) url.searchParams.set('code', code); else url.searchParams.delete('code');
  window.history.replaceState({}, '', url);
}

function renderDetail(order) {
  const data = order.data || {};
  const teamName = data.teamName || 'Untitled order';
  const status = data.status || 'new';
  const garments = data.garments || [];
  const rowsByGarment = data.rowsByGarment || {};

  document.getElementById('detailTeamName').textContent = teamName;
  document.getElementById('detailCode').textContent = order.code;
  document.getElementById('detailUpdated').textContent = formatDate(order.updated_at);
  document.getElementById('detailStatusSelect').value = status;

  const infoGrid = document.getElementById('detailInfoGrid');
  const totalPieces = totalPiecesFor(data);
  const totalEntries = garments.reduce((sum, g) => sum + (rowsByGarment[g] || []).length, 0);
  infoGrid.innerHTML =
    '<div class="info-card"><div class="info-label">Garments on order</div><div class="info-value">' + garments.length + '</div></div>' +
    '<div class="info-card"><div class="info-label">Total entries</div><div class="info-value">' + totalEntries + '</div></div>' +
    '<div class="info-card"><div class="info-label">Total pieces (sized)</div><div class="info-value">' + totalPieces + '</div></div>' +
    '<div class="info-card"><div class="info-label">Manager code</div><div class="info-value mono">' + (data.managerCode ? escapeHtml(data.managerCode) : '\u2014 not set') + '</div></div>';

  const body = document.getElementById('detailBody');
  body.innerHTML = '';

  if (garments.length === 0) {
    body.innerHTML = '<div class="empty-state">No garments have been added to this order yet.</div>';
  }

  let grandTotal = 0;
  const summaryEl = document.getElementById('detailSummaryByGarment');
  summaryEl.innerHTML = '';

  garments.forEach(garment => {
    const rows = rowsByGarment[garment] || [];
    if (rows.length === 0) return;

    const block = document.createElement('div');
    block.className = 'review-garment-block';
    const heading = document.createElement('div');
    heading.className = 'review-garment-heading';
    heading.innerHTML = '<span>' + escapeHtml(garment) + '</span><small>' + rows.length + (rows.length === 1 ? ' entry' : ' entries') + '</small>';
    block.appendChild(heading);

    const table = document.createElement('table');
    table.className = 'review-table';
    table.innerHTML = '<thead><tr><th>#</th><th>Name on back</th><th>Size</th><th>Number</th><th>Notes / sponsors</th><th>Added by</th></tr></thead>';
    const tbody = document.createElement('tbody');
    const counts = {};
    rows.forEach((row, i) => {
      if (row.size) { grandTotal += 1; counts[row.size] = (counts[row.size] || 0) + 1; }
      const tr = document.createElement('tr');
      const sizeCell = row.size ? escapeHtml(row.size) : '<span class="review-missing">missing</span>';
      const nameCell = row.name ? escapeHtml(row.name) : '<span class="review-missing">missing</span>';
      tr.innerHTML = '<td>' + (i + 1) + '</td><td>' + nameCell + '</td><td>' + sizeCell + '</td><td>' +
        escapeHtml(row.number || '') + '</td><td>' + escapeHtml(row.notes || '') + '</td><td>' + escapeHtml(row.addedBy || '') + '</td>';
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    block.appendChild(table);
    body.appendChild(block);

    const sizesUsed = Object.keys(counts);
    if (sizesUsed.length > 0) {
      const rowDiv = document.createElement('div');
      rowDiv.className = 'summary-garment-row';
      const nameSpan = document.createElement('span');
      nameSpan.className = 'summary-garment-name';
      nameSpan.textContent = garment;
      rowDiv.appendChild(nameSpan);
      const chips = document.createElement('div');
      chips.className = 'size-breakdown';
      sizesUsed.forEach(s => {
        const chip = document.createElement('span');
        chip.className = 'size-chip';
        chip.textContent = s + ' x' + counts[s];
        chips.appendChild(chip);
      });
      rowDiv.appendChild(chips);
      summaryEl.appendChild(rowDiv);
    }
  });

  document.getElementById('detailGrandTotal').textContent = grandTotal;
}

function downloadDetailCSV() {
  const order = allOrders.find(o => o.code === currentDetailCode);
  if (!order) return;
  const data = order.data || {};
  const garments = data.garments || [];
  const rowsByGarment = data.rowsByGarment || {};
  const header = ['Garment', 'Name on back', 'Size', 'Number', 'Notes / sponsors', 'Added by'];
  const lines = [header.join(',')];
  garments.forEach(garment => {
    (rowsByGarment[garment] || []).forEach(row => {
      const line = [garment, row.name || '', row.size || '', row.number || '', row.notes || '', row.addedBy || '']
        .map(v => '"' + String(v).replace(/"/g, '""') + '"')
        .join(',');
      lines.push(line);
    });
  });
  const csvContent = lines.join('\n');
  const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  const fileName = (data.teamName || order.code || 'order').replace(/[^a-zA-Z0-9-]/g, '-') + '-order.csv';
  link.download = fileName;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);
}

// --- Wire up events ---
document.getElementById('searchInput').addEventListener('input', renderOrdersTable);
document.getElementById('statusFilter').addEventListener('change', renderOrdersTable);
document.getElementById('refreshBtn').addEventListener('click', loadOrders);
document.getElementById('backLink').addEventListener('click', closeDetail);
document.getElementById('detailCsvBtn').addEventListener('click', downloadDetailCSV);
document.getElementById('detailPrintBtn').addEventListener('click', () => window.print());
document.getElementById('detailStatusSelect').addEventListener('change', e => {
  if (currentDetailCode) updateStatus(currentDetailCode, e.target.value);
});
document.getElementById('detailOpenCustomerBtn').addEventListener('click', () => {
  if (!currentDetailCode) return;
  window.open('index.html?order=' + encodeURIComponent(currentDetailCode), '_blank');
});

// --- Init ---
async function init() {
  await loadOrders();
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  if (code) {
    const order = allOrders.find(o => o.code === code);
    if (order) openDetail(code);
  }
  // light polling to keep the dashboard fresh
  setInterval(() => {
    if (!currentDetailCode) loadOrders();
  }, 30000);
}

init();
</script>
